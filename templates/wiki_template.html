<!DOCTYPE html>
<html lang="ru">

<head>
    <meta charset="UTF-8">
    <title>{{ title }}</title>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <meta property="og:title" content="{{ title }}">
    <meta property="og:description" content="S.P.F. Base Wiki - {{ title }}">
    <meta property="og:type" content="article">

    <link rel="icon" href="/static/favicon.ico" type="image/x-icon">

    <link rel="stylesheet" href="{{ 'css/wiki-base.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/wiki-headings.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/wiki-scroll.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/wiki-search.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/wiki-toc.css' | ver }}" />

    <link rel="stylesheet" href="{{ 'css/extension-dialog.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/extension-registry.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/extension-card.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/extension-small-text.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/extension-strikethrough.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/extension-button.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/extension-grid.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/extension-image.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/extension-autolink-preview.css' | ver }}" />
    <link rel="stylesheet" href="{{ 'css/extension-restricted.css' | ver }}" />
</head>

<body {% if background_url %} style="--wiki-bg-image: url('{{ background_url | ver }}');" {% endif %}>
    <div class="page">

        <header class="header">
            <div class="header-top">
                <h1>{{ title }}</h1>

                <div class="wiki-search">
                    <input type="search" placeholder="Поиск по вики..." />
                </div>
            </div>

            <div class="meta">
                {% if author %}
                {% if author | length == 1 %}
                <span>Автор: {{ author[0] }}</span>
                {% else %}
                <span>Авторы: {{ author | join(', ') }}</span>
                {% endif %}
                {% endif %}

                {% if date %}
                <span class="sep">•</span>
                <span>Обновлено: {{ date }}</span>
                {% endif %}
            </div>
        </header>

        <div class="layout">

            <aside class="toc-panel">
                <nav class="toc-nav">
                    <a href="javascript:history.back()">← Назад</a>
                    <span class="sep">•</span>
                    <a href="/">На главную</a>
                </nav>
            </aside>

            <main class="content">
                {{ content | safe }}
            </main>

        </div>

        <footer class="footer">
            SPF Wiki
        </footer>

    </div>

    <script src="{{ 'js/wiki-scroll.js' | ver }}"></script>
    <script src="{{ 'js/wiki-search.js' | ver }}"></script>
    <script src="{{ 'js/wiki-toc.js' | ver }}"></script>
    <script src="{{ 'js/wiki-link-preview.js' | ver }}"></script>
</body>

</html>
