name: Normalize and Deploy

on:
  push:
    branches: [ master ]

permissions:
  contents: write

jobs:
  normalize:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check if MD files changed
        id: md_check
        run: |
          if git diff --name-only ${{ github.event.before }} ${{ github.sha }} | grep -E "\.md$"; then
            echo "changed=true" >> $GITHUB_OUTPUT
          else
            echo "changed=false" >> $GITHUB_OUTPUT
          fi

      - name: Setup Python
        if: steps.md_check.outputs.changed == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Ensure updater exists
        if: steps.md_check.outputs.changed == 'true'
        run: |
          test -f scripts/normalize_wiki.py || { echo "scripts/normalize_wiki.py not found"; exit 1; }

      - name: Run updater
        if: steps.md_check.outputs.changed == 'true'
        run: python scripts/normalize_wiki.py

      - name: Commit and push changes via deploy key
        if: steps.md_check.outputs.changed == 'true'
        run: |
          if [[ -n "$(git status --porcelain)" ]]; then
            git config user.name "auto normalize"
            git config user.email "auto-normalize@users.noreply.github.com"
            git add .
            git commit -m "Normalize wiki"

            mkdir -p ~/.ssh
            echo "${{ secrets.DEPLOY_KEY }}" > ~/.ssh/id_rsa
            chmod 600 ~/.ssh/id_rsa
            ssh-keyscan github.com >> ~/.ssh/known_hosts

            git remote set-url origin git@github.com:${{ github.repository }}.git
            git push origin master
          else
            echo "No changes to commit"

  deploy:
    needs: normalize
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo via deploy key
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - name: Run deploy script on server
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.SPF_HOST }}
          username: ${{ secrets.SPF_USER }}
          key: ${{ secrets.SPF_SSH_KEY }}
          script: |
            cd /root/spf/wiki/
            touch MAINTENANCE

            sudo systemctl stop spf-wiki.service

            git fetch origin master
            git reset --hard origin/master

            chmod -R o+rX static

            sudo systemctl start spf-wiki.service

            rm -f MAINTENANCE
